<div class="search-bar">
  <input id="tq" name="q" placeholder="Search tickets..." hx-trigger="keyup changed delay:500ms" hx-target="#tres" hx-post="/views/tickets/search">
  <button hx-post="/views/tickets/search" hx-include="#tq" hx-target="#tres">Search</button>
</div>
<div id="tres" hx-trigger="load" hx-get="/views/tickets/search?q=" hx-target="this"></div>
<script>htmx.on('htmx:load',function(e){var i=e.detail.elt.querySelector('#tq');if(i)i.focus()})</script>
