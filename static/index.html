<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-grid Support Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0b1120; color: #e2e8f0; display: flex; height: 100vh;
  }
  .sidebar {
    width: 220px; background: #0f1729; border-right: 1px solid #1e293b;
    display: flex; flex-direction: column; padding: 14px 10px; flex-shrink: 0; overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .sidebar .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 0 4px; flex-shrink: 0; }
  .sidebar .logo .icon {
    width: 30px; height: 30px; background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .sidebar .logo h1 { font-size: 13px; font-weight: 600; color: #f1f5f9; }
  .sidebar .logo .sub { font-size: 10px; color: #64748b; }
  .sidebar .menu { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .sidebar .menu .label {
    font-size: 9px; text-transform: uppercase; letter-spacing: .08em;
    color: #475569; margin: 10px 0 3px 8px;
  }
  .sidebar .menu button {
    display: flex; align-items: center; gap: 7px; padding: 6px 8px;
    background: transparent; border: none; color: #94a3b8; font-size: 12px;
    border-radius: 5px; cursor: pointer; text-align: left; width: 100%; transition: all .1s;
  }
  .sidebar .menu button:hover { background: #1e293b; color: #e2e8f0; }
  .sidebar .menu button.active { background: #1e293b; color: #fff; }
  .sidebar .menu button .ico { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar .status { margin-top: auto; padding-top: 10px; border-top: 1px solid #1e293b; flex-shrink: 0; }
  .sidebar .status .row { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #64748b; padding: 2px 0; }
  .sidebar .status .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .sidebar .status .dot.green { background: #22c55e; }
  .sidebar .status .dot.red { background: #ef4444; }
  .sidebar .status .dot.yellow { background: #eab308; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .toolbar {
    padding: 8px 16px; background: #0f1729; border-bottom: 1px solid #1e293b;
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap; flex-shrink: 0;
  }
  .toolbar .c {
    padding: 4px 9px; border-radius: 5px; font-size: 11px; cursor: pointer;
    background: #1e293b; color: #94a3b8; border: 1px solid transparent; transition: all .1s; white-space: nowrap;
  }
  .toolbar .c:hover { border-color: #334155; color: #e2e8f0; }
  .toolbar .c.prime { background: #1d4ed8; color: #fff; }
  .toolbar .c.prime:hover { background: #2563eb; }

  #panel {
    flex: 1; overflow-y: auto; padding: 12px 16px 8px; display: flex;
    flex-direction: column; gap: 8px;
  }
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .search-bar {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .search-bar input, .search-bar textarea {
    flex: 1; padding: 8px 12px; border: 1px solid #334155; border-radius: 6px;
    background: #1e293b; color: #e2e8f0; font-size: 13px; outline: none; font-family: inherit; resize: vertical;
  }
  .search-bar input:focus, .search-bar textarea:focus { border-color: #2563eb; }
  .search-bar button {
    padding: 8px 16px; background: #2563eb; color: #fff; border: none;
    border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap;
  }
  .search-bar button.sm { padding: 8px 12px; font-size: 11px; }
  .search-bar button:hover { background: #1d4ed8; }
  .search-bar button.green { background: #16a34a; }
  .search-bar button.green:hover { background: #15803d; }
  .search-bar button.amber { background: #d97706; }
  .search-bar button.amber:hover { background: #b45309; }

  .card {
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    padding: 10px 14px; transition: all .1s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: #2563eb; }
  .card .title { font-size: 13px; font-weight: 500; color: #f1f5f9; }
  .card .meta { font-size: 11px; color: #64748b; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
  .card .meta span { display: inline-flex; align-items: center; gap: 3px; }
  .card .preview { font-size: 12px; color: #94a3b8; margin-top: 5px; line-height: 1.5; }
  .card .val { font-size: 13px; color: #e2e8f0; margin-top: 2px; }
  .card .val.green { color: #4ade80; }
  .card .val.red { color: #f87171; }
  .card .val.amber { color: #facc15; }
  .card .val.mono { font-family: monospace; font-size: 12px; }

  .msg { line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user {
    align-self: flex-end; background: #2563eb; color: #fff; max-width: 75%;
    padding: 10px 14px; border-radius: 10px;
  }
  .msg.bot { max-width: 92%; }
  .msg .badge {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: #374151; color: #94a3b8; margin: 8px 0 4px; font-weight: 500;
  }
  .msg .pass { color: #4ade80; }
  .msg .fail { color: #f87171; }
  .msg .warn { color: #facc15; }
  .msg .mono { font-family: monospace; font-size: 12px; color: #94a3b8; }

  .input-area {
    padding: 8px 16px 12px; background: #0f1729; border-top: 1px solid #1e293b;
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  .input-area .iw {
    flex: 1; display: flex; align-items: center; background: #1e293b;
    border: 1px solid #334155; border-radius: 8px; padding: 0 12px;
  }
  .input-area .iw:focus-within { border-color: #2563eb; }
  .input-area .iw textarea {
    flex: 1; background: transparent; border: none; color: #e2e8f0; font-size: 13px;
    padding: 8px 0; outline: none; resize: none; font-family: inherit; line-height: 1.5;
    max-height: 80px;
  }
  .input-area button {
    padding: 8px 20px; background: #2563eb; color: #fff; border: none;
    border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .input-area button:disabled { opacity: .4; cursor: not-allowed; }

  .detect-box {
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  .detect-box .badge { font-size: 11px; padding: 3px 10px; border-radius: 5px; font-weight: 500; }
  .detect-box .badge.grid { background: #166534; color: #86efac; }
  .detect-box .badge.external { background: #7c2d12; color: #fdba74; }
  .detect-box .badge.unknown { background: #374151; color: #9ca3af; }

  .prop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 6px; }
  .prop-item { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; }
  .prop-item .rname { font-size: 12px; color: #94a3b8; }
  .prop-item .rip { font-size: 11px; color: #64748b; }
  .prop-item .rresult { font-size: 13px; font-family: monospace; margin-top: 3px; }
  .prop-item .rresult.green { color: #4ade80; }
  .prop-item .rresult.red { color: #f87171; }

  .result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .result-table th { text-align: left; padding: 6px 8px; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; font-size: 11px; }
  .result-table td { padding: 6px 8px; border-bottom: 1px solid #1e293b; color: #e2e8f0; }
  .result-table tr:hover td { background: #1e293b; }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: #64748b; margin: 14px 0 6px 4px; font-weight: 500;
  }

  .details-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; }
  .details-grid .k { color: #64748b; }
  .details-grid .v { color: #e2e8f0; }
  .details-grid .v.green { color: #4ade80; }
  .details-grid .v.red { color: #f87171; }
  .details-grid .v.amber { color: #facc15; }
  .details-grid .v.mono { font-family: monospace; font-size: 12px; }

  .flex-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .article-view {
    background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px;
  }
  .article-view h2 { font-size: 16px; color: #f1f5f9; margin-bottom: 4px; }
  .article-view .cat { font-size: 11px; color: #64748b; margin-bottom: 10px; }
  .article-view .body { font-size: 13px; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; }
  .article-view .back { font-size: 12px; color: #2563eb; cursor: pointer; margin-bottom: 8px; display: inline-block; }
  .article-view .back:hover { text-decoration: underline; }

  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; text-align: center; padding: 40px 20px;
  }
  .welcome h2 { font-size: 18px; color: #f1f5f9; margin-bottom: 6px; }
  .welcome p { font-size: 13px; color: #64748b; max-width: 440px; line-height: 1.6; }
  .welcome .grid { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .welcome .grid .crd {
    padding: 10px 16px; background: #1e293b; border-radius: 8px; cursor: pointer;
    border: 1px solid #334155; transition: all .1s; min-width: 120px;
  }
  .welcome .grid .crd:hover { border-color: #2563eb; }
  .welcome .grid .crd .t { font-size: 12px; color: #e2e8f0; font-weight: 500; }
  .welcome .grid .crd .d { font-size: 10px; color: #64748b; margin-top: 1px; }

  .loading { color: #64748b; font-size: 12px; padding: 20px; text-align: center; }
  .empty { color: #475569; font-size: 13px; padding: 20px; text-align: center; }
  .hidden { display: none !important; }

  @keyframes b { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

  @media (max-width: 720px) {
    .sidebar { width: 50px; padding: 10px 5px; }
    .sidebar .logo h1, .sidebar .logo .sub, .sidebar .menu .label, .sidebar .menu button span:not(.ico), .sidebar .status .row span:not(.dot) { display: none; }
    .sidebar .menu button { justify-content: center; padding: 6px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="icon">1G</div>
    <div><h1>1-grid</h1><div class="sub">Support Agent</div></div>
  </div>

  <div class="menu">
    <div class="label">Main</div>
    <button onclick="showView('chat')"><span class="ico">💬</span><span>Chat</span></button>
    <button class="active" onclick="showView('dashboard')"><span class="ico">🏠</span><span>Dashboard</span></button>
    <button onclick="showView('history')"><span class="ico">📋</span><span>History</span></button>
    <button onclick="showView('kb')"><span class="ico">📚</span><span>Knowledge Base</span></button>
    <button onclick="showView('tickets')"><span class="ico">🎫</span><span>Tickets</span></button>

    <div class="label">Diagnose</div>
    <button onclick="showView('zonewalk')"><span class="ico">🌐</span><span>Zonewalk</span></button>
    <button onclick="showView('headers')"><span class="ico">📧</span><span>Mail Headers</span></button>
    <button onclick="showView('propagation')"><span class="ico">📡</span><span>Propagation</span></button>
    <button onclick="showView('nameservers')"><span class="ico">🔗</span><span>Nameservers</span></button>
    <button onclick="showView('logs')"><span class="ico">📄</span><span>Log Analysis</span></button>

    <div class="label">Tools</div>
    <button onclick="showView('dns')"><span class="ico">🔎</span><span>DNS Lookup</span></button>
    <button onclick="showView('whois')"><span class="ico">📇</span><span>WHOIS</span></button>
    <button onclick="showView('ports')"><span class="ico">🔌</span><span>Port Scan</span></button>
    <button onclick="showView('httpcheck')"><span class="ico">🌍</span><span>HTTP Check</span></button>
    <button onclick="showView('subdomains')"><span class="ico">🗂️</span><span>Subdomains</span></button>
    <button onclick="showView('blocklists')"><span class="ico">🛡️</span><span>Blocklists</span></button>

    <div class="label">Data</div>
    <button onclick="showView('conversations')"><span class="ico">💬</span><span>Conversations</span></button>
    <button onclick="showView('issues')"><span class="ico">🪲</span><span>Issues</span></button>
    <button onclick="showView('patterns')"><span class="ico">🔍</span><span>Patterns</span></button>
    <button onclick="showView('servers')"><span class="ico">🖥️</span><span>Servers</span></button>
    <button onclick="showView('quickref')"><span class="ico">⚡</span><span>Quick Ref</span></button>
    <button onclick="showView('status')"><span class="ico">📊</span><span>Status</span></button>
  </div>

  <div class="status">
    <div class="row"><span class="dot green" id="sdot"></span><span id="sname">ok</span></div>
    <div class="row"><span class="dot green" id="odot"></span><span id="oname">Ollama</span></div>
  </div>
</div>

<div class="main">
  <div class="toolbar" id="toolbar"></div>
  <div id="panel"></div>
  <div class="input-area" id="inputArea">
    <div class="iw"><textarea id="input" rows="1" placeholder="Type a domain + issue, or /command..." enterkeyhint="send"></textarea></div>
    <button id="sendBtn" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
  const panel = document.getElementById('panel');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const toolbar = document.getElementById('toolbar');
  const inputArea = document.getElementById('inputArea');
  let loading = false;

  input.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
  input.addEventListener('input', () => { input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,80)+'px'; });

  // ── NAVIGATION ──
  function showView(name) {
    document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
    const btn = [...document.querySelectorAll('.menu button')].find(b => b.getAttribute('onclick')?.includes("'"+name+"'") || b.getAttribute('onclick')?.includes(`'${name}'`));
    if (btn) btn.classList.add('active');
    toolbar.innerHTML = '';
    inputArea.style.display = 'none';
    if (name === 'chat') { inputArea.style.display=''; showChat(); }
    else { loadView(name); }
  }

  function loadView(name) {
    const fn = views[name];
    if (fn) fn();
    else showEmpty('View not found: '+name);
  }

  // Sidebar button text matching for showView highlighting
  const viewLabels = {
    'chat':'chat','dashboard':'dashboard','history':'history','kb':'knowledge base',
    'tickets':'tickets','zonewalk':'zonewalk','headers':'mail headers','propagation':'propagation',
    'nameservers':'nameservers','logs':'log analysis','dns':'dns lookup','whois':'whois',
    'ports':'port scan','httpcheck':'http check','subdomains':'subdomains','blocklists':'blocklists',
    'conversations':'conversations','issues':'issues','patterns':'patterns',
    'servers':'servers','quickref':'quick ref','status':'status'
  };

  // ── UTILITY ──
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showLoading() { panel.innerHTML = '<div class="loading">Loading...</div>'; }
  function showEmpty(t) { panel.innerHTML = `<div class="empty">${esc(t)}</div>`; }
  function setToolbar(html) { toolbar.innerHTML = html; }

  function copyText(t) {
    navigator.clipboard.writeText(t).then(() => {
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#2563eb;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:999';
      el.textContent = 'Copied!';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    });
  }

  // ── CHAT ──
  let chatHistory = [];

  function showChat() {
    panel.innerHTML = '';
    setToolbar(`
      <span class="c prime" onclick="doChat('purify1.co.za WordPress 403')">🔍 purify1.co.za</span>
      <span class="c prime" onclick="doChat('lond.co.za email not receiving')">📧 lond.co.za email</span>
      <span class="c" onclick="doChat('/kb SPF record')">📚 KB SPF</span>
      <span class="c" onclick="doChat('/history purify1')">📋 /history</span>
      <span class="c" onclick="doChat('/status')">📊 /status</span>
    `);
    if (chatHistory.length === 0) {
      panel.innerHTML = `\
<div class="welcome">
  <h2>1-grid Support Agent</h2>
  <p>Diagnose hosting issues, search tickets, KB articles, and more. Type a domain + issue or use the sidebar panels.</p>
  <div class="grid">
    <div class="crd" onclick="doChat('purify1.co.za WordPress 403')"><div class="t">🔍 purify1.co.za</div><div class="d">WordPress 403</div></div>
    <div class="crd" onclick="doChat('lond.co.za email not receiving')"><div class="t">📧 lond.co.za</div><div class="d">Email issue</div></div>
    <div class="crd" onclick="doChat('/kb SPF record')"><div class="t">📚 KB SPF</div><div class="d">Search KB</div></div>
    <div class="crd" onclick="doChat('/history purify1')"><div class="t">📋 /history</div><div class="d">Ticket history</div></div>
  </div>
</div>`;
    } else {
      for (const m of chatHistory) panel.appendChild(msgEl(m.role, m.text));
    }
  }

  function msgEl(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    if (role === 'user') { d.textContent = text; return d; }
    const lines = text.split('\n');
    let html = '';
    for (let line of lines) {
      const t = line.trim();
      if (t.startsWith('===')) html += `<div class="badge">${esc(t.replace(/=/g,'').trim())}</div>`;
      else if (/^(OK|FAIL|WARN|INFO)\s/.test(t) || /\s(OK|FAIL|WARN|INFO)\s/.test(t)) {
        const cls = t.includes('FAIL') ? 'fail' : t.includes('WARN') ? 'warn' : 'pass';
        html += `<div class="${cls}">${esc(t)}</div>`;
      } else if (t.startsWith('  -') || t.startsWith('  #') || t.startsWith('    ')) {
        html += `<div class="mono" style="padding-left:12px">${esc(t)}</div>`;
      } else if (t) { html += `<div>${esc(t)}</div>`; }
      else { html += '<div style="height:3px"></div>'; }
    }
    d.innerHTML = html;
    return d;
  }

  function addMsg(role, text) {
    chatHistory.push({role, text});
    if (panel.querySelector('.welcome')) panel.innerHTML = '';
    panel.appendChild(msgEl(role, text));
    panel.scrollTop = panel.scrollHeight;
  }

  function typingOn() {
    const d = document.createElement('div'); d.className = 'msg bot'; d.id = 'typing';
    d.innerHTML = '<div style="display:flex;gap:4px;padding:4px 0"><span style="width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:b 1.2s infinite"></span><span style="width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:b 1.2s infinite;animation-delay:.2s"></span><span style="width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:b 1.2s infinite;animation-delay:.4s"></span></div>';
    panel.appendChild(d); panel.scrollTop = panel.scrollHeight;
  }
  function typingOff() { document.getElementById('typing')?.remove(); }

  function doChat(text) { addMsg('user', text); callChat(text); }

  function sendMsg() {
    const text = input.value.trim(); if (!text) return;
    input.value = ''; input.style.height = 'auto';
    doChat(text);
  }

  async function callChat(msg) {
    loading = true; sendBtn.disabled = true; typingOn();
    try {
      const r = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg}) });
      typingOff();
      if (!r.ok) { addMsg('bot', `Error: ${r.status}`); return; }
      const d = await r.json();
      addMsg('bot', d.response || '(empty)');
    } catch(e) { typingOff(); addMsg('bot', 'Backend error: server unreachable.'); }
    finally { loading = false; sendBtn.disabled = false; input.focus(); }
  }

  async function apiPost(url, body) {
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!r.ok) throw new Error(`${url} returned ${r.status}`);
    return r.json();
  }

  // ── DASHBOARD ──
  views.dashboard = function() {
    setToolbar(`<span class="c prime" onclick="showView('zonewalk')">🌐 Zonewalk</span><span class="c prime" onclick="showView('nameservers')">🔗 NS Check</span><span class="c prime" onclick="showView('propagation')">📡 Propagation</span><span class="c prime" onclick="showView('headers')">📧 Headers</span><span class="c prime" onclick="showView('logs')">📄 Logs</span>`);
    panel.innerHTML = `
<div class="welcome" style="padding:20px">
  <h2 style="font-size:22px">1-grid Support Agent</h2>
  <p style="margin-bottom:16px;max-width:500px">Diagnose hosting issues, check DNS, analyze mail headers, scan ports, search KB articles.</p>
  <div class="grid" style="gap:8px">
    <div class="crd" onclick="showView('zonewalk')"><div class="t">🌐 Zonewalk</div><div class="d">Full domain diagnosis</div></div>
    <div class="crd" onclick="showView('nameservers')"><div class="t">🔗 Nameservers</div><div class="d">1-grid detection</div></div>
    <div class="crd" onclick="showView('propagation')"><div class="t">📡 Propagation</div><div class="d">DNS propagation check</div></div>
    <div class="crd" onclick="showView('headers')"><div class="t">📧 Mail Headers</div><div class="d">Parse email headers</div></div>

  window.runZonewalk = async function(deep) {
    const domain = document.getElementById('zwd').value.trim();
    if (!domain) return;
    const c = document.getElementById('zwres');
    c.innerHTML = '<div class="loading">Running zonewalk...</div>';
    try {
      const d = await apiPost('/zonewalk/check', { domain, deep, ports: deep, reputation: deep });
      let html = '';

      // Provider badge

        html += `<span class="k"></span><span class="v red">⚠ PTR mismatch</span>`;

      if (d.mx_records && d.mx_records.length) {

      if (d.soa) {
        html += `<span class="k">SOA</span><span class="v mono">${esc(d.soa.mname||'')} · serial ${d.soa.serial||'?'}</span>`;

      html += '<div class="details-grid" style="margin-bottom:6px">';

      const dkSt = d.dkim_records && d.dkim_records.length ? 'OK' : 'MISSING';

      html += `<span class="k">DKIM</span><span class="v ${dkSt==='OK'?'green':'red'}">${dkSt}</span>`;
      html += `<span class="k">DMARC</span><span class="v ${dmSt==='OK'?'green':'red'}">${dmSt}</span>`;

      html += '</div>';

      if (d.http_status || d.https_status) {
        html += '<div class="section-label">Web / SSL</div>';
        html += '<div class="details-grid" style="margin-bottom:6px">';
        if (d.http_status) html += `<span class="k">HTTP</span><span class="v">${d.http_status.status_code}</span>`;
        if (d.https_status) html += `<span class="k">HTTPS</span><span class="v">${d.https_status.status_code}</span>`;
        if (d.ssl_expiry_days !== null && d.ssl_expiry_days !== undefined) {
          const cls = d.ssl_expiry_days < 14 ? 'red' : d.ssl_expiry_days < 60 ? 'amber' : 'green';
          html += `<span class="k">SSL</span><span class="v ${cls}">${d.ssl_expiry_days} days</span>`;
        }
        html += '</div>';
      }

      // Open ports
      if (d.open_ports && d.open_ports.length) {
        html += '<div class="section-label">Open Ports</div>';
        html += '<div class="flex-row" style="margin-bottom:6px">';
        d.open_ports.forEach(p => {
          html += `<span class="c" style="background:#1e293b;border:1px solid #334155;padding:2px 8px;border-radius:4px;font-size:11px">${p[1]} (${p[0]})</span>`;
        });
        html += '</div>';
      }

      // Propagation
      if (d.propagation && d.propagation.length) {
        html += '<div class="section-label">DNS Propagation</div>';
        html += '<div class="prop-grid" style="margin-bottom:6px">';
        d.propagation.forEach(p => {
          const cls = p.match ? 'green' : 'red';
          html += `<div class="prop-item"><div class="rname">${esc(p.resolver)}</div><div class="rip">${p.ip}</div><div class="rresult ${cls}">${p.result && p.result.length ? esc(p.result.join(', ')) : 'NONE'} ${p.match ? '✓' : '✗'}</div></div>`;
        });
        html += '</div>';
      }

      // Blocklists
      if (d.blocklists && d.blocklists.length) {
        html += '<div class="section-label">IP Reputation</div>';
        html += '<div class="flex-row" style="margin-bottom:6px">';
        d.blocklists.forEach(b => {
          const cls = b.listed ? 'red' : 'green';
          html += `<span class="c" style="background:#1e293b;border:1px solid #334155;padding:2px 8px;border-radius:4px;font-size:11px;color:${cls==='red'?'#f87171':'#4ade80'}">${b.list}: ${b.listed ? 'LISTED' : 'Clean'}</span>`;
        });
        html += '</div>';
      }

      // Subdomains
      if (d.subdomains && d.subdomains.length) {
        html += '<div class="section-label">Subdomains Found</div>';
        html += d.subdomains.map(sd => {
          const info = sd.ips ? sd.ips.join(', ') : sd.cname ? 'CNAME '+sd.cname : '';
          return `<div class="card" style="padding:5px 10px;margin-bottom:2px"><div class="val mono">${esc(sd.subdomain)} → ${esc(info)}</div></div>`;
        }).join('');
      }

      // Issues
      if (d.issues && d.issues.length) {
        html += '<div class="section-label" style="margin-top:8px">Issues Found</div>';
        d.issues.forEach(iss => {
          const cls = iss.startsWith('NO_') || iss.startsWith('HTTP_5') || iss.startsWith('SSL_EXP') ? 'red' : iss.startsWith('PTR_') || iss.startsWith('DMARC_') ? 'amber' : 'amber';
          html += `<div style="padding:3px 0;font-size:12px;color:${cls==='red'?'#f87171':cls==='amber'?'#facc15':'#94a3b8'}">⚠ ${esc(iss)}</div>`;
        });
      }

      // WHOIS
      if (d.whois && d.whois.registrar) {
        html += '<div class="section-label" style="margin-top:8px">WHOIS</div>';
        html += '<div class="details-grid">';
        html += `<span class="k">Registrar</span><span class="v">${esc(d.whois.registrar)}</span>`;
        if (d.whois.expiry) html += `<span class="k">Expiry</span><span class="v">${esc(d.whois.expiry)}</span>`;
        html += '</div>';
      }

      c.innerHTML = html;
    } catch(e) { c.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`; }
  }

      let results;

      let html = `<div class="card" style="margin-bottom:6px"><div class="title">🔎 ${esc(domain)} ${type}</div></div>`;
      if (Array.isArray(results)) {
        results.forEach(r => { html += `<div class="card" style="padding:6px 10px;margin-bottom:2px"><div class="val mono">${esc(r)}</div></div>`; });
      } else if (typeof results === 'object') {
        for (const [k, v] of Object.entries(results)) {
          const vals = Array.isArray(v) ? v.join(', ') : String(v);
          html += `<div class="card" style="padding:6px 10px;margin-bottom:2px"><div class="meta">${k}</div><div class="val mono">${esc(vals)}</div></div>`;

  }

    try {
      const d = await apiPost('/tools/portscan', { domain });
      let html = `<div class="card" style="margin-bottom:6px"><div class="title">🔌 Port Scan: ${esc(d.domain)}</div><div class="meta">${d.open_ports ? d.open_ports.length : 0} ports open</div></div>`;
      if (d.open_ports && d.open_ports.length) {
        d.open_ports.forEach(p => {
          html += `<div class="card" style="padding:6px 10px;margin-bottom:2px"><div class="title">${esc(p.service)} <span style="font-weight:400;color:#64748b">port ${p.port}</span></div></div>`;
        });
      } else {
        html += '<div class="empty">No common ports open (or host unreachable)</div>';
      }
      c.innerHTML = html;
    } catch(e) { c.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`; }
  }

  // ── HTTP CHECK ──
  views.httpcheck = function() {
    setToolbar(`<span class="c" onclick="document.getElementById('hcd').focus()">🌍 Enter domain</span>`);
    panel.innerHTML = `
      <div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Check HTTP, HTTPS response codes and SSL certificate expiry</div>
      <div class="search-bar">
        <input id="hcd" placeholder="Domain (e.g. example.co.za)" onkeydown="if(event.key==='Enter') doHttpCheck()">
        <button onclick="doHttpCheck()">Check</button>
      </div>
      <div id="hcres"></div>`;
    document.getElementById('hcd').focus();
  }
  window.doHttpCheck = async function() {
    const domain = document.getElementById('hcd').value.trim();
    if (!domain) return;
    const c = document.getElementById('hcres');
    c.innerHTML = '<div class="loading">Checking...</div>';
    try {
      const d = await apiPost('/tools/httpcheck', { domain });
      let html = `<div class="card" style="margin-bottom:6px"><div class="title">🌍 ${esc(d.domain)}</div></div>`;
      html += '<div class="details-grid">';
      if (d.http) {
        const code = d.http.status_code;
        const cls = code >= 400 ? 'red' : code >= 300 ? 'amber' : 'green';
        html += `<span class="k">HTTP</span><span class="v ${cls}">${code}</span>`;
      }
      if (d.https) {
        const code = d.https.status_code;
        const cls = code >= 400 ? 'red' : code >= 300 ? 'amber' : 'green';
        html += `<span class="k">HTTPS</span><span class="v ${cls}">${code}</span>`;
      }
      if (d.ssl_days !== null && d.ssl_days !== undefined) {
        const cls = d.ssl_days < 0 ? 'red' : d.ssl_days < 14 ? 'red' : d.ssl_days < 60 ? 'amber' : 'green';
        const txt = d.ssl_days < 0 ? 'EXPIRED' : d.ssl_days + ' days';
        html += `<span class="k">SSL</span><span class="v ${cls}">${txt}</span>`;
      }
      html += '</div>';
      if (d.http && d.http.error) html += `<div class="card" style="margin-top:6px;border-color:#7f1d1d"><div class="preview" style="color:#f87171">HTTP error: ${esc(d.http.error)}</div></div>`;
      c.innerHTML = html;
    } catch(e) { c.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`; }
  }

  // ── SUBDOMAINS ──
  views.subdomains = function() {
    setToolbar(`<span class="c" onclick="document.getElementById('sbd').focus()">🗂️ Enter domain</span>`);
    panel.innerHTML = `
      <div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Enumerate common subdomains (www, mail, cpanel, ftp, api, etc.)</div>
      <div class="search-bar">
        <input id="sbd" placeholder="Domain" onkeydown="if(event.key==='Enter') doSubdomains()">
        <button onclick="doSubdomains()">Enumerate</button>
      </div>
      <div id="sbres"></div>`;
    document.getElementById('sbd').focus();
  }
  window.doSubdomains = async function() {
    const domain = document.getElementById('sbd').value.trim();
    if (!domain) return;
    const c = document.getElementById('sbres');
    c.innerHTML = '<div class="loading">Enumerating...</div>';
    try {
      const d = await apiPost('/tools/subdomains', { domain });
      let html = `<div class="card" style="margin-bottom:6px"><div class="title">🗂️ Subdomains: ${esc(d.domain)}</div><div class="meta">${d.subdomains ? d.subdomains.length : 0} found</div></div>`;
      if (d.subdomains && d.subdomains.length) {
        d.subdomains.forEach(sd => {
          const info = sd.ips ? sd.ips.join(', ') : sd.cname ? 'CNAME → '+sd.cname : '';
          html += `<div class="card" style="padding:5px 10px;margin-bottom:2px"><div class="val mono">${esc(sd.subdomain)} → ${esc(info)}</div></div>`;
        });
      } else {
        html += '<div class="empty">No common subdomains found</div>';
      }
      c.innerHTML = html;
    } catch(e) { c.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`; }
  }

  // ── BLOCKLISTS ──
  views.blocklists = function() {
    setToolbar(`<span class="c" onclick="document.getElementById('bld').focus()">🛡️ Enter IP</span>`);
    panel.innerHTML = `
      <div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Check an IP address against DNS blocklists (Spamhaus, SpamCop, SORBS, Barracuda, PSBL)</div>
      <div class="search-bar">
        <input id="bld" placeholder="IP address (e.g. 1.2.3.4)" onkeydown="if(event.key==='Enter') doBlocklists()">
        <button onclick="doBlocklists()">Check</button>
      </div>
      <div id="blres"></div>`;
    document.getElementById('bld').focus();
  }
  window.doBlocklists = async function() {
    const ip = document.getElementById('bld').value.trim();
    if (!ip) return;
    const c = document.getElementById('blres');
    c.innerHTML = '<div class="loading">Checking blocklists...</div>';
    try {
      const d = await (await fetch('/tools/blocklists?ip='+encodeURIComponent(ip))).json();
      let html = `<div class="card" style="margin-bottom:6px"><div class="title">🛡️ IP: ${esc(d.ip)}</div></div>`;
      if (d.blocklists && d.blocklists.length) {
        d.blocklists.forEach(b => {
          const cls = b.listed ? 'red' : 'green';
          html += `<div class="card" style="padding:6px 10px;margin-bottom:2px"><div class="title">${esc(b.list)}</div><div class="val ${cls}">${b.listed ? 'LISTED ⚠' : 'Clean ✓'}</div></div>`;
        });
      }
      c.innerHTML = html;
    } catch(e) { c.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`; }
  }

  // ── TOAST ──
  function toast(msg, type) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:6px;font-size:13px;z-index:999;${type==='err'?'background:#ef4444;color:#fff':type==='warn'?'background:#d97706;color:#fff':'background:#2563eb;color:#fff'}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // Detect file:// protocol and warn
  if (window.location.protocol === 'file:') {
    document.getElementById('panel').innerHTML = `<div class="card" style="border-color:#ef4444;padding:20px;text-align:center;margin-top:40px">
      <div style="font-size:18px;color:#f87171;margin-bottom:8px">⚠ Cannot Load</div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:12px">This app must be served via HTTP. Open <b>http://localhost:8000</b> in your browser instead.</div>
      <div style="font-size:12px;color:#64748b">Run: <code style="background:#1e293b;padding:2px 6px;border-radius:3px">python -m uvicorn app.main:app --host 0.0.0.0 --port 8000</code></div>
    </div>`;
  }

  // ── INIT ──
  if (window.location.protocol !== 'file:') {
    showView('dashboard');
    fetch('/health').then(r=>r.json()).then(d => { document.getElementById('sname').textContent = 'ok'; }).catch(() => { document.getElementById('sdot').className='dot red'; document.getElementById('sname').textContent='offline'; toast('Backend server unreachable', 'err'); });
    fetch('/health/ollama').then(r=>r.json()).then(d => { document.getElementById('oname').textContent = d.status==='ok' ? 'Ollama: on' : 'Ollama: off'; document.getElementById('odot').className = d.status==='ok' ? 'dot green' : 'dot yellow'; }).catch(() => { document.getElementById('odot').className='dot red'; document.getElementById('oname').textContent='Ollama: err'; });
  }
</script>
</body>
</html>
