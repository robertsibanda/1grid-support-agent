<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-grid Support Agent</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/ext/response-targets.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0b1120;color:#e2e8f0;display:flex;height:100vh}
  .sidebar{width:220px;background:#0f1729;border-right:1px solid #1e293b;display:flex;flex-direction:column;padding:14px 10px;flex-shrink:0;overflow-y:auto}
  .sidebar::-webkit-scrollbar{width:3px}
  .sidebar::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
  .sidebar .logo{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:0 4px;flex-shrink:0}
  .sidebar .logo .icon{width:30px;height:30px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
  .sidebar .logo h1{font-size:13px;font-weight:600;color:#f1f5f9}
  .sidebar .logo .sub{font-size:10px;color:#64748b}
  .sidebar .menu{flex:1;display:flex;flex-direction:column;gap:1px}
  .sidebar .menu .label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin:10px 0 3px 8px}
  .sidebar .menu a{display:flex;align-items:center;gap:7px;padding:6px 8px;background:transparent;border:none;color:#94a3b8;font-size:12px;border-radius:5px;cursor:pointer;text-align:left;width:100%;transition:all .1s;text-decoration:none}
  .sidebar .menu a:hover{background:#1e293b;color:#e2e8f0}
  .sidebar .menu a.active{background:#1e293b;color:#fff}
  .sidebar .menu a .ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
  .sidebar .status{margin-top:auto;padding-top:10px;border-top:1px solid #1e293b;flex-shrink:0}
  .sidebar .status .row{display:flex;align-items:center;gap:5px;font-size:10px;color:#64748b;padding:2px 0}
  .sidebar .status .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .sidebar .status .dot.green{background:#22c55e}
  .sidebar .status .dot.red{background:#ef4444}
  .sidebar .status .dot.yellow{background:#eab308}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .toolbar{padding:8px 16px;background:#0f1729;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
  .toolbar .c{padding:4px 9px;border-radius:5px;font-size:11px;cursor:pointer;background:#1e293b;color:#94a3b8;border:1px solid transparent;transition:all .1s;white-space:nowrap;text-decoration:none}
  .toolbar .c:hover{border-color:#334155;color:#e2e8f0}
  .toolbar .c.prime{background:#1d4ed8;color:#fff}
  .toolbar .c.prime:hover{background:#2563eb}
  #panel{flex:1;overflow-y:auto;padding:8px 12px 4px;display:flex;flex-direction:column;gap:4px}
  #panel::-webkit-scrollbar{width:5px}
  #panel::-webkit-scrollbar-track{background:transparent}
  #panel::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .search-bar{display:flex;gap:8px;margin-bottom:10px}
  .search-bar input,.search-bar textarea,.search-bar select{flex:1;padding:8px 12px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit;resize:vertical}
  .search-bar input:focus,.search-bar textarea:focus,.search-bar select:focus{border-color:#2563eb}
  .search-bar button{padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
  .search-bar button.sm{padding:8px 12px;font-size:11px}
  .search-bar button:hover{background:#1d4ed8}
  .search-bar button.green{background:#16a34a}
  .search-bar button.green:hover{background:#15803d}
  .search-bar button.amber{background:#d97706}
  .search-bar button.amber:hover{background:#b45309}
  .card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;transition:all .1s}
  .card.clickable{cursor:pointer}
  .card.clickable:hover{border-color:#2563eb}
  .card .title{font-size:13px;font-weight:500;color:#f1f5f9}
  .card .meta{font-size:11px;color:#64748b;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .card .meta span{display:inline-flex;align-items:center;gap:3px}
  .card .preview{font-size:12px;color:#94a3b8;margin-top:5px;line-height:1.5}
  .card .val{font-size:13px;color:#e2e8f0;margin-top:2px}
  .card .val.green{color:#4ade80}
  .card .val.red{color:#f87171}
  .card .val.amber{color:#facc15}
  .card .val.mono{font-family:monospace;font-size:12px}
  .msg{line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word}
  .msg.user{align-self:flex-end;background:#2563eb;color:#fff;max-width:75%;padding:10px 14px;border-radius:10px}
  .msg.bot{max-width:92%}
  .msg .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;background:#374151;color:#94a3b8;margin:8px 0 4px;font-weight:500}
  .msg .pass{color:#4ade80}
  .msg .fail{color:#f87171}
  .msg .warn{color:#facc15}
  .msg .mono{font-family:monospace;font-size:12px;color:#94a3b8}
  .chat-status{font-size:12px;color:#64748b;padding:4px 0;min-height:18px}
  .chat-status:empty{padding:0}
  .chat-content{line-height:1.5;font-size:13px;color:#cbd5e1}
  .chat-tokens{font-size:14px;color:#e2e8f0;white-space:pre-wrap;word-break:break-word;margin:4px 0;border-right:2px solid #2563eb;animation:blink 0.8s step-end infinite}
  @keyframes blink{50%{border-color:transparent}}
  .chat-content .zw-result{max-height:300px;overflow-y:auto}
  .chat-content .zw-result::-webkit-scrollbar{width:4px}
  .chat-content .zw-result::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
  .input-area{padding:8px 16px 12px;background:#0f1729;border-top:1px solid #1e293b;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
  .input-area .iw{flex:1;display:flex;align-items:center;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:0 12px}
  .input-area .iw:focus-within{border-color:#2563eb}
  .input-area .iw textarea{flex:1;background:transparent;border:none;color:#e2e8f0;font-size:13px;padding:8px 0;outline:none;resize:none;font-family:inherit;line-height:1.5;max-height:80px}
  .input-area button{padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
  .input-area button:disabled{opacity:.4;cursor:not-allowed}
  .detect-box{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px}
  .detect-box .badge{font-size:11px;padding:3px 10px;border-radius:5px;font-weight:500}
  .detect-box .badge.grid{background:#166534;color:#86efac}
  .detect-box .badge.external{background:#7c2d12;color:#fdba74}
  .detect-box .badge.unknown{background:#374151;color:#9ca3af}
  .prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px}
  .prop-item{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:8px 12px}
  .prop-item .rname{font-size:12px;color:#94a3b8}
  .prop-item .rip{font-size:11px;color:#64748b}
  .prop-item .rresult{font-size:13px;font-family:monospace;margin-top:3px}
  .prop-item .rresult.green{color:#4ade80}
  .prop-item .rresult.red{color:#f87171}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin:14px 0 6px 4px;font-weight:500}
  .details-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:13px}
  .details-grid .k{color:#64748b}
  .details-grid .v{color:#e2e8f0}
  .details-grid .v.green{color:#4ade80}
  .details-grid .v.red{color:#f87171}
  .details-grid .v.amber{color:#facc15}
  .details-grid .v.mono{font-family:monospace;font-size:12px}
  .flex-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .article-view{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px}
  .article-view h2{font-size:16px;color:#f1f5f9;margin-bottom:4px}
  .article-view .cat{font-size:11px;color:#64748b;margin-bottom:10px}
  .article-view .body{font-size:13px;line-height:1.7;color:#cbd5e1;white-space:pre-wrap}
  .article-view .back{font-size:12px;color:#2563eb;cursor:pointer;margin-bottom:8px;display:inline-block;text-decoration:none}
  .article-view .back:hover{text-decoration:underline}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px}
  .welcome h2{font-size:18px;color:#f1f5f9;margin-bottom:6px}
  .welcome p{font-size:13px;color:#64748b;max-width:440px;line-height:1.6}
  .welcome .grid{margin-top:16px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .welcome .grid .crd{padding:10px 16px;background:#1e293b;border-radius:8px;cursor:pointer;border:1px solid #334155;transition:all .1s;min-width:120px;text-decoration:none;color:inherit}
  .welcome .grid .crd:hover{border-color:#2563eb}
  .welcome .grid .crd .t{font-size:12px;color:#e2e8f0;font-weight:500}
  .welcome .grid .crd .d{font-size:10px;color:#64748b;margin-top:1px}
  .loading{color:#64748b;font-size:12px;padding:20px;text-align:center}
  .empty{color:#475569;font-size:13px;padding:20px;text-align:center}
  .hidden{display:none!important}
  @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
  .htmx-indicator{opacity:0;transition:opacity .2s}
  .htmx-request .htmx-indicator{opacity:1}
  .htmx-request.htmx-indicator{opacity:1}
  .wrap-text{white-space:pre-wrap;word-break:break-word;font-family:monospace;font-size:12px}
  .conv-detail .msg-row{padding:8px 10px;margin-bottom:4px;border-radius:6px;font-size:13px;line-height:1.5}
  .conv-detail .msg-row.user{background:#1e3a5f;border:1px solid #1e40af;margin-left:20px}
  .conv-detail .msg-row.assistant,.conv-detail .msg-row.support{background:#1e293b;border:1px solid #334155;margin-right:20px}
  .conv-detail .msg-row.system{background:#1a2e1a;border:1px solid #1e4a1e;font-size:11px;color:#94a3b8}
  .conv-detail .msg-row .label{font-size:10px;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
  .conv-detail .msg-row .content{white-space:pre-wrap;word-break:break-word}
  .conv-detail .msg-row .meta{font-size:10px;color:#475569;margin-top:4px}
  .conv-detail .msg-row .cmd{font-family:monospace;font-size:11px;color:#facc15;margin-top:4px;padding:4px 8px;background:#0f1729;border-radius:4px}
  .back-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#1e293b;border:1px solid #334155;border-radius:5px;color:#94a3b8;font-size:12px;cursor:pointer;margin-bottom:8px;transition:all .1s}
  .back-btn:hover{border-color:#2563eb;color:#e2e8f0}
  @media(max-width:720px){.sidebar{width:50px;padding:10px 5px}.sidebar .logo h1,.sidebar .logo .sub,.sidebar .menu .label,.sidebar .menu a span:not(.ico),.sidebar .status .row span:not(.dot){display:none}.sidebar .menu a{justify-content:center;padding:6px}}
</style>
</head>
<body hx-ext="response-targets">

<div class="sidebar">
  <div class="logo">
    <div class="icon">1G</div>
    <div><h1>1-grid</h1><div class="sub">Support Agent</div></div>
  </div>
  <div class="menu">
    <div class="label">Main</div>
    <a href="#" hx-get="/views/dashboard" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar" class="active"><span class="ico">🏠</span><span>Dashboard</span></a>
    <a href="#" hx-get="/views/chat" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">💬</span><span>Chat</span></a>
    <a href="#" hx-get="/views/history" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">📋</span><span>History</span></a>
    <a href="#" hx-get="/views/kb" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">📚</span><span>KB</span></a>
    <a href="#" hx-get="/views/tickets" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">🎫</span><span>Tickets</span></a>

    <div class="label">Diagnose</div>
    <a href="#" hx-get="/views/zonewalk" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">🌐</span><span>Zonewalk</span></a>
    <a href="#" hx-get="/views/headers" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">📧</span><span>Mail Headers</span></a>
    <a href="#" hx-get="/views/logs" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">📝</span><span>Log Analysis</span></a>

    <div class="label">Data</div>
    <a href="#" hx-get="/views/conversations" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">💬</span><span>Conversations</span></a>
    <a href="#" hx-get="/views/issues" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">🪲</span><span>Issues</span></a>
    <a href="#" hx-get="/views/patterns" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">🔍</span><span>Patterns</span></a>
    <a href="#" hx-get="/views/servers" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">🖥️</span><span>Servers</span></a>
    <a href="#" hx-get="/views/quickref" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">⚡</span><span>Quick Ref</span></a>
    <a href="#" hx-get="/views/status" hx-target="#panel" hx-swap="innerHTML" hx-indicator="#loadbar"><span class="ico">📊</span><span>Status</span></a>
  </div>

  <div class="status">
    <div class="row"><span class="dot green" id="sdot"></span><span id="sname">ok</span></div>
    <div class="row"><span class="dot green" id="odot"></span><span id="oname">Ollama</span></div>
  </div>
</div>

<div class="main">
  <div class="toolbar" id="toolbar">
    <div id="loadbar" class="htmx-indicator" style="font-size:11px;color:#64748b">Loading...</div>
  </div>
  <div id="panel"></div>
  <div class="input-area" id="inputArea" hidden>
    <div class="iw"><textarea id="input" rows="1" placeholder="Type a domain + issue, or /command..." enterkeyhint="send"></textarea></div>
    <button id="sendBtn" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
  htmx.on('htmx:beforeRequest', function(evt) {
    document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
    var trigger = evt.detail.elt;
    if (trigger && trigger.closest('.menu a')) trigger.closest('.menu a').classList.add('active');
  });
  htmx.on('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'panel') {
      var ta = document.getElementById('inputArea');
      if (ta) ta.hidden = evt.detail.elt && evt.detail.elt.id !== 'chat-panel';
    }
  });
  htmx.on('htmx:responseError', function(evt) {
    var panel = document.getElementById('panel');
    if (evt.detail.target.id === 'panel' && evt.detail.xhr.status !== 200) {
      panel.innerHTML = '<div class="empty" style="padding:40px">⚠ Server error ('+evt.detail.xhr.status+'). Make sure the backend is running.</div>';
    }
  });
  document.addEventListener('keydown', function(e) {
    var input = document.getElementById('input');
    if (!input) return;
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  // Chat session ID (persistent across page loads)
  var chatSessionId = localStorage.getItem('chat_session');
  if (!chatSessionId) {
    chatSessionId = 'sess_' + Math.random().toString(36).substring(2,10) + Date.now().toString(36);
    localStorage.setItem('chat_session', chatSessionId);
  }

  function sendChat() {
    var input = document.getElementById('input');
    if (!input) return;
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    var msgs = document.getElementById('chat-messages');
    var sendBtn = document.getElementById('sendBtn');
    if (!msgs) return;

    // Disable input during processing
    input.disabled = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    // Append user message
    var userEl = document.createElement('div');
    userEl.className = 'msg user';
    userEl.textContent = text;
    msgs.appendChild(userEl);
    msgs.scrollTop = msgs.scrollHeight;

    // Create bot message container
    var botEl = document.createElement('div');
    botEl.className = 'msg bot';
    msgs.appendChild(botEl);
    msgs.scrollTop = msgs.scrollHeight;

    // Status bar
    var statusEl = document.createElement('div');
    statusEl.className = 'chat-status';
    botEl.appendChild(statusEl);

    // Content area
    var contentEl = document.createElement('div');
    contentEl.className = 'chat-content';
    botEl.appendChild(contentEl);

    // Streaming state
    var currentTokenDiv = null;
    var fullText = '';
    var hasTokens = false;

    // Start streaming fetch
    fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'message=' + encodeURIComponent(text) + '&session_id=' + encodeURIComponent(chatSessionId)
    }).then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      function readStream() {
        reader.read().then(function(result) {
          if (result.done) {
            finish();
            return;
          }
          buffer += decoder.decode(result.value, {stream: true});
          var lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            if (line.startsWith('event: ')) {
              var eventType = line.substring(7).trim();
              // Read next line for data
              if (i + 1 < lines.length) {
                var dataLine = lines[i + 1].trim();
                if (dataLine.startsWith('data: ')) {
                  processEvent(eventType, dataLine.substring(6).trim());
                  i++; // skip next line
                }
              } else {
                // data might be in next chunk
                buffer = line + '\n' + buffer;
              }
            } else if (line.startsWith('data: ')) {
              processEvent('message', line.substring(6).trim());
            }
          }
          readStream();
        }).catch(function(err) {
          statusEl.innerHTML = '<span style="color:#f87171;font-size:11px">⚠ Stream error: ' + err.message + '</span>';
          finish();
        });
      }

      function processEvent(eventType, raw) {
        try {
          var data = JSON.parse(raw);
        } catch(e) { return; }

        if (eventType === 'status') {
          statusEl.innerHTML = '<span style="color:#94a3b8;font-size:11px">' + (data.text || '') + '</span>';
          msgs.scrollTop = msgs.scrollHeight;
        } else if (eventType === 'html') {
          // Append HTML content directly
          var div = document.createElement('div');
          div.innerHTML = data.html || '';
          contentEl.appendChild(div);
          msgs.scrollTop = msgs.scrollHeight;
        } else if (eventType === 'token') {
          hasTokens = true;
          var aiTarget = document.getElementById('ai-tokens');
          if (aiTarget) {
            var txt = data.text || '';
            fullText += txt;
            aiTarget.textContent = fullText;
          } else {
            if (!currentTokenDiv) {
              currentTokenDiv = document.createElement('div');
              currentTokenDiv.className = 'chat-tokens';
              contentEl.appendChild(currentTokenDiv);
            }
            var txt = data.text || '';
            fullText += txt;
            currentTokenDiv.textContent = fullText;
          }
          msgs.scrollTop = msgs.scrollHeight;
        } else if (eventType === 'replace_last') {
          statusEl.innerHTML = '';
          var aiContainer = document.getElementById('ai-analysis');
          if (aiContainer) {
            aiContainer.innerHTML = data.html || '';
          } else if (currentTokenDiv && currentTokenDiv.parentNode) {
            currentTokenDiv.parentNode.removeChild(currentTokenDiv);
            currentTokenDiv = null;
            var div = document.createElement('div');
            div.innerHTML = data.html || '';
            contentEl.appendChild(div);
          } else {
            var div = document.createElement('div');
            div.innerHTML = data.html || '';
            contentEl.appendChild(div);
          }
          msgs.scrollTop = msgs.scrollHeight;
        } else if (eventType === 'done') {
          statusEl.innerHTML = '';
          finish();
        } else if (eventType === 'error') {
          var errDiv = document.createElement('div');
          errDiv.style.cssText = 'color:#f87171;font-size:12px;padding:6px 0';
          errDiv.textContent = data.text || 'Unknown error';
          contentEl.appendChild(errDiv);
          finish();
        }
      }

      function finish() {
        statusEl.innerHTML = '';
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
        input.focus();
      }

      readStream();
    }).catch(function(err) {
      statusEl.innerHTML = '<span style="color:#f87171;font-size:11px">⚠ Connection failed: ' + err.message + '</span>';
      input.disabled = false;
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    });
  }
  function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function showConvDetail(el, data) {
    var panel = document.getElementById('panel');
    var isObj = typeof data === 'object';
    var cv = isObj ? data : {};
    try { if (!isObj) cv = JSON.parse(data); } catch(e) {}

    var html = '<div class="back-btn" onclick="htmx.ajax(\'GET\', \'/views/conversations\', {target:\'#panel\',swap:\'innerHTML\'})">← Back to conversations</div>';
    html += '<div class="conv-detail">';

    // Header
    var title = esc(cv.source || cv.role || 'Conversation');
    var cid = esc(cv.id || '');
    var ts = esc(cv.timestamp || '');
    var domain = cv.domain || (cv.metadata && cv.metadata.domain) || '';
    html += '<div style="background:#0f1729;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;margin-bottom:8px">';
    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    html += '<span style="font-size:14px;font-weight:600">' + title + '</span>';
    if (cid) html += '<span style="font-size:11px;color:#64748b">#' + cid + '</span>';
    if (domain) html += '<span style="background:#1e3a5f;color:#93c5fd;padding:2px 8px;border-radius:12px;font-size:11px">' + domain + '</span>';
    html += '</div>';
    if (ts) html += '<div style="font-size:11px;color:#64748b;margin-top:3px">' + ts + '</div>';
    html += '</div>';

    // Messages
    var msgs = cv.messages || [];
    if (msgs.length === 0 && cv.content) {
      msgs = [{role: cv.role || 'user', content: cv.content, thoughts: cv.thoughts, commands: cv.commands}];
    }
    for (var i = 0; i < msgs.length; i++) {
      var m = msgs[i];
      var role = m.role || 'user';
      var content = esc(m.content || '');
      var thoughts = m.thoughts || [];
      var commands = m.commands || [];
      var cls = role === 'user' || role === 'client' ? 'user' : role === 'assistant' || role === 'support' ? 'assistant' : 'system';
      html += '<div class="msg-row ' + cls + '">';
      html += '<div class="label">' + esc(role) + '</div>';
      html += '<div class="content">' + content + '</div>';
      if (thoughts.length) {
        for (var t = 0; t < thoughts.length; t++) {
          html += '<div class="meta">🤔 ' + esc(thoughts[t]) + '</div>';
        }
      }
      if (commands.length) {
        for (var c = 0; c < commands.length; c++) {
          html += '<div class="cmd">$ ' + esc(commands[c]) + '</div>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
    panel.innerHTML = html;
  }
  fetch('/health').then(function(r){return r.json()}).then(function(d){
    document.getElementById('sname').textContent = 'ok';
  }).catch(function(){
    document.getElementById('sdot').className = 'dot red';
    document.getElementById('sname').textContent = 'offline';
  });
  fetch('/health/ollama').then(function(r){return r.json()}).then(function(d){
    document.getElementById('oname').textContent = d.status==='ok' ? 'Ollama' : 'Ollama off';
    document.getElementById('odot').className = d.status==='ok' ? 'dot green' : 'dot yellow';
  }).catch(function(){
    document.getElementById('odot').className = 'dot red';
    document.getElementById('oname').textContent = 'Ollama err';
  });
</script>
</body>
</html>
